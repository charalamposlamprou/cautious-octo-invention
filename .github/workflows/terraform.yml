name: Terraform

on:
  push:
    branches:
      - '**'           # any branch — non-master runs dev/test, master runs staging/prod
  pull_request:
    branches:
      - '**'           # PRs targeting any branch run dev/test plan (no apply)

env:
  TF_VERSION: "1.7.0"
  AWS_REGION: "eu-west-1"
  TF_IN_AUTOMATION: "true"

concurrency:
  group: tf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Lint + scan: cheap, fail fast ─────────────────────────────────────────
  lint:
    name: Lint & Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false

  # ── Plan: dev + test ──────────────────────────────────────────────────────
  # Runs on any non-master push (feature branches deploy here) AND on any PR
  # (plan-only, posted as a comment for reviewers).
  plan-dev-test:
    name: Plan - ${{ matrix.environment }}
    needs: lint
    if: |
      (github.event_name == 'push' && github.ref != 'refs/heads/master') ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            role_var: AWS_ROLE_DEV
          - environment: test
            role_var: AWS_ROLE_TEST
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/tf-plan
        with:
          environment: ${{ matrix.environment }}
          role-to-assume: ${{ vars[matrix.role_var] }}
          aws-region: ${{ env.AWS_REGION }}
          terraform-version: ${{ env.TF_VERSION }}

  # ── Plan: staging + prod ──────────────────────────────────────────────────
  # Runs on master push only (after a PR merges to master).
  plan-staging-prod:
    name: Plan - ${{ matrix.environment }}
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: staging
            role_var: AWS_ROLE_STAGING
          - environment: prod
            role_var: AWS_ROLE_PROD
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/tf-plan
        with:
          environment: ${{ matrix.environment }}
          role-to-assume: ${{ vars[matrix.role_var] }}
          aws-region: ${{ env.AWS_REGION }}
          terraform-version: ${{ env.TF_VERSION }}

  # ── Apply: dev → test (any non-master push) ───────────────────────────────
  apply-dev:
    name: Apply - dev
    needs: plan-dev-test
    if: github.event_name == 'push' && github.ref != 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: tf-apply-dev
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/tf-apply
        with:
          environment: dev
          role-to-assume: ${{ vars.AWS_ROLE_DEV }}
          aws-region: ${{ env.AWS_REGION }}
          terraform-version: ${{ env.TF_VERSION }}

  apply-test:
    name: Apply - test
    needs: apply-dev
    if: github.event_name == 'push' && github.ref != 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: test
    concurrency:
      group: tf-apply-test
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/tf-apply
        with:
          environment: test
          role-to-assume: ${{ vars.AWS_ROLE_TEST }}
          aws-region: ${{ env.AWS_REGION }}
          terraform-version: ${{ env.TF_VERSION }}

  # ── Apply: staging → prod (master push only) ──────────────────────────────
  apply-staging:
    name: Apply - staging
    needs: plan-staging-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: tf-apply-staging
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/tf-apply
        with:
          environment: staging
          role-to-assume: ${{ vars.AWS_ROLE_STAGING }}
          aws-region: ${{ env.AWS_REGION }}
          terraform-version: ${{ env.TF_VERSION }}

  apply-prod:
    name: Apply - prod
    needs: apply-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: tf-apply-prod
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/tf-apply
        with:
          environment: prod
          role-to-assume: ${{ vars.AWS_ROLE_PROD }}
          aws-region: ${{ env.AWS_REGION }}
          terraform-version: ${{ env.TF_VERSION }}
