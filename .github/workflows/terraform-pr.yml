name: Terraform (PR)

on:
  pull_request:
    branches:
      - '**'

env:
  TF_VERSION: "1.7.0"
  AWS_REGION: "eu-west-1"
  TF_IN_AUTOMATION: "true"

concurrency:
  group: tf-pr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint & Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false

  plan:
    name: Plan - ${{ matrix.environment }}
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            role_var: AWS_ROLE_DEV
          - environment: test
            role_var: AWS_ROLE_TEST
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/tf-plan
        with:
          environment: ${{ matrix.environment }}
          role-to-assume: ${{ vars[matrix.role_var] }}
          aws-region: ${{ env.AWS_REGION }}
          terraform-version: ${{ env.TF_VERSION }}

  apply-dev:
    name: Apply - dev
    needs: plan
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: tf-apply-dev
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/tf-apply
        with:
          environment: dev
          role-to-assume: ${{ vars.AWS_ROLE_DEV }}
          aws-region: ${{ env.AWS_REGION }}
          terraform-version: ${{ env.TF_VERSION }}

  apply-test:
    name: Apply - test
    needs: apply-dev
    runs-on: ubuntu-latest
    environment: test
    concurrency:
      group: tf-apply-test
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/tf-apply
        with:
          environment: test
          role-to-assume: ${{ vars.AWS_ROLE_TEST }}
          aws-region: ${{ env.AWS_REGION }}
          terraform-version: ${{ env.TF_VERSION }}
