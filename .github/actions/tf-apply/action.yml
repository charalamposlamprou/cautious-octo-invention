name: Terraform Apply
description: Configure AWS via OIDC, init backend, download saved plan, and apply (with tfcmt on PRs).

inputs:
  environment:
    description: Logical environment name (dev|test|staging|prod). Used for backend config and tfvars.
    required: true
  role-to-assume:
    description: AWS IAM role ARN to assume via OIDC.
    required: true
  aws-region:
    description: AWS region
    required: false
    default: eu-west-1
  terraform-version:
    description: Terraform version
    required: false
    default: "1.7.0"
  working-directory:
    description: Path to Terraform root
    required: false
    default: "."
  tfcmt-version:
    description: tfcmt version to install.
    required: false
    default: "v4.14.0"

runs:
  using: composite
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}

    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Install tfcmt
      shell: bash
      run: |
        if ! command -v tfcmt >/dev/null 2>&1; then
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/suzuki-shunsuke/tfcmt/releases/download/${{ inputs.tfcmt-version }}/tfcmt_linux_amd64.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" tfcmt
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
        fi
        tfcmt --version

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform init -lock-timeout=5m -backend-config=backend/${{ inputs.environment }}.hcl

    - name: Download Plan
      uses: actions/download-artifact@v4
      with:
        name: tfplan-${{ inputs.environment }}
        path: ${{ inputs.working-directory }}

    - name: Terraform Apply
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          tfcmt -var "target:${{ inputs.environment }}" apply -- \
            terraform apply -lock-timeout=5m -auto-approve tfplan
        else
          terraform apply -lock-timeout=5m -auto-approve tfplan
        fi
