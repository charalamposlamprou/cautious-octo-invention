name: Terraform Apply
description: Configure AWS via OIDC, init backend, download saved plan, and apply.

inputs:
  environment:
    description: Logical environment name (dev|test|staging|prod). Used for backend config and tfvars.
    required: true
  role-to-assume:
    description: AWS IAM role ARN to assume via OIDC.
    required: true
  aws-region:
    description: AWS region
    required: false
    default: eu-west-1
  terraform-version:
    description: Terraform version
    required: false
    default: "1.7.0"
  working-directory:
    description: Path to Terraform root
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}

    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform init -lock-timeout=5m -backend-config=backend/${{ inputs.environment }}.hcl

    - name: Download Plan
      uses: actions/download-artifact@v4
      with:
        name: tfplan-${{ inputs.environment }}
        path: ${{ inputs.working-directory }}

    - name: Terraform Apply
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform apply -lock-timeout=5m -auto-approve tfplan
