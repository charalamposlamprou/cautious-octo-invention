name: Terraform Plan
description: Configure AWS via OIDC, init backend, run plan (with tfcmt on PRs), upload artifact.

inputs:
  environment:
    description: Logical environment name (dev|test|staging|prod). Used for backend config and tfvars.
    required: true
  role-to-assume:
    description: AWS IAM role ARN to assume via OIDC.
    required: true
  aws-region:
    description: AWS region
    required: false
    default: eu-west-1
  terraform-version:
    description: Terraform version
    required: false
    default: "1.7.0"
  working-directory:
    description: Path to Terraform root
    required: false
    default: "."
  mode:
    description: 'plan or destroy. When "destroy", terraform plan -destroy is run.'
    required: false
    default: "plan"
  tfcmt-version:
    description: tfcmt version to install.
    required: false
    default: "v4.14.0"

runs:
  using: composite
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}

    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Install tfcmt
      shell: bash
      run: |
        if ! command -v tfcmt >/dev/null 2>&1; then
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/suzuki-shunsuke/tfcmt/releases/download/${{ inputs.tfcmt-version }}/tfcmt_linux_amd64.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" tfcmt
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
        fi
        tfcmt --version

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform init -lock-timeout=5m -backend-config=backend/${{ inputs.environment }}.hcl

    - name: Terraform Validate
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform validate

    - name: Terraform Plan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TF_MODE: ${{ inputs.mode }}
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -o pipefail
        destroy_flag=""
        if [ "$TF_MODE" = "destroy" ]; then
          destroy_flag="-destroy"
        fi
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          tfcmt -var "target:${{ inputs.environment }}" plan -- \
            terraform plan $destroy_flag \
              -lock-timeout=5m \
              -var-file=envs/${{ inputs.environment }}.tfvars \
              -out=tfplan \
              -no-color
        else
          terraform plan $destroy_flag \
            -lock-timeout=5m \
            -var-file=envs/${{ inputs.environment }}.tfvars \
            -out=tfplan \
            -no-color | tee plan.txt
        fi

    - name: Upload Plan
      uses: actions/upload-artifact@v4
      with:
        name: tfplan-${{ inputs.environment }}
        path: |
          ${{ inputs.working-directory }}/tfplan
          ${{ inputs.working-directory }}/plan.txt
        retention-days: 1
        if-no-files-found: ignore
