name: Terraform Plan
description: Configure AWS via OIDC, init backend, plan, upload artifact, comment on PR.

inputs:
  environment:
    description: Logical environment name (dev|test|staging|prod). Used for backend config and tfvars.
    required: true
  role-to-assume:
    description: AWS IAM role ARN to assume via OIDC.
    required: true
  aws-region:
    description: AWS region
    required: false
    default: eu-west-1
  terraform-version:
    description: Terraform version
    required: false
    default: "1.7.0"
  working-directory:
    description: Path to Terraform root
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}

    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform init -lock-timeout=5m -backend-config=backend/${{ inputs.environment }}.hcl

    - name: Terraform Validate
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform validate

    - name: Terraform Plan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -o pipefail
        terraform plan \
          -lock-timeout=5m \
          -var-file=envs/${{ inputs.environment }}.tfvars \
          -out=tfplan \
          -no-color | tee plan.txt

    - name: Upload Plan
      uses: actions/upload-artifact@v4
      with:
        name: tfplan-${{ inputs.environment }}
        path: |
          ${{ inputs.working-directory }}/tfplan
          ${{ inputs.working-directory }}/plan.txt
        retention-days: 1

    - name: Comment Plan on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const env = '${{ inputs.environment }}';
          const wd = '${{ inputs.working-directory }}';
          let plan = fs.readFileSync(`${wd}/plan.txt`, 'utf8');
          const max = 60000;
          if (plan.length > max) {
            plan = plan.slice(0, max) + '\n... (truncated, see job logs)';
          }
          const marker = `<!-- tfplan-${env} -->`;
          const body = `${marker}\n### Terraform Plan — \`${env}\`\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${plan}\n\`\`\`\n</details>`;
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body && c.body.startsWith(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: existing.id, body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });
          }
